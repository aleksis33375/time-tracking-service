name: Compute Face Embeddings

on:
  schedule:
    - cron: '*/10 * * * *'   # каждые 10 минут
  workflow_dispatch:           # ручной запуск из GitHub UI

concurrency:
  group: face-embeddings
  cancel-in-progress: false   # не отменять текущий прогон, ждать завершения

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-worker/requirements-embedding.txt

      - name: Install dependencies
        run: pip install -r ai-worker/requirements-embedding.txt

      - name: Compute embeddings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ai-worker/compute_embeddings.py
