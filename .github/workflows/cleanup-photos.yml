name: Cleanup — Delete Old Photos

on:
  schedule:
    - cron: '0 2 * * *'   # каждый день в 02:00 UTC (05:00 МСК)
  workflow_dispatch:        # ручной запуск из GitHub UI

concurrency:
  group: cleanup-photos
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-worker/requirements-cleanup.txt

      - name: Install dependencies
        run: pip install -r ai-worker/requirements-cleanup.txt

      - name: Delete photos older than 60 days
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ai-worker/cleanup_photos.py
