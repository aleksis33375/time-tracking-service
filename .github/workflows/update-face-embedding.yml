name: Update Face Embedding

on:
  workflow_dispatch:
    inputs:
      employee_name:
        description: 'Имя сотрудника (точно как в БД)'
        required: true
        default: 'Сайрахмон'
      photo_path:
        description: 'Путь к фото в Storage (напр. photos/-1003993016756/2643.jpg)'
        required: true
        default: 'photos/-1003993016756/2643.jpg'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-worker/requirements-worker.txt

      - name: Install dependencies
        run: pip install -r ai-worker/requirements-worker.txt

      - name: Update face embedding
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python ai-worker/update_face_embedding.py \
            "${{ github.event.inputs.employee_name }}" \
            "${{ github.event.inputs.photo_path }}"
