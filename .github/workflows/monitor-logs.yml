name: Monitor — Webhook Logs

on:
  schedule:
    - cron: '*/5 * * * *'   # каждые 5 минут
  workflow_dispatch:          # ручной запуск из GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check Supabase webhook logs
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node - <<'EOF'
          const https = require('https');
          const url = new URL(process.env.SUPABASE_URL);
          const key = process.env.SUPABASE_SERVICE_ROLE_KEY;

          // Смотрим логи за последние 10 минут
          const since = new Date(Date.now() - 10 * 60 * 1000).toISOString();

          function query(path) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: url.hostname,
                path,
                method: 'GET',
                headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
              };
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.end();
            });
          }

          const sinceEncoded = encodeURIComponent(since);

          Promise.all([
            query(`/rest/v1/logs?order=timestamp.desc&limit=20&timestamp=gt.${sinceEncoded}`),
            query(`/rest/v1/events?order=created_at.desc&limit=10&created_at=gt.${sinceEncoded}`)
          ]).then(([logs, events]) => {
            const ts = new Date().toLocaleString('ru-RU', { timeZone: 'Europe/Moscow' });
            console.log(`\n====== Проверка ${ts} (МСК) ======`);

            // Логи webhook
            const webhookLogs = logs.filter(l => l.source === 'webhook-handler');
            if (webhookLogs.length === 0) {
              console.log('📭 Новых фото за последние 10 мин нет');
            } else {
              console.log(`\n📨 Активность webhook (${webhookLogs.length} записей):`);
              webhookLogs.forEach(l => {
                const t = new Date(l.timestamp).toLocaleString('ru-RU', { timeZone: 'Europe/Moscow' });
                const icon = l.level === 'error' ? '🔴' : l.level === 'warn' ? '🟡' : '🟢';
                console.log(`  ${icon} ${t} — ${l.message}`);
                if (l.meta && Object.keys(l.meta).length > 0) {
                  console.log(`     ${JSON.stringify(l.meta)}`);
                }
              });
            }

            // Новые события
            if (events.length > 0) {
              console.log(`\n✅ Новые события (${events.length}):`);
              events.forEach(e => {
                const t = new Date(e.created_at).toLocaleString('ru-RU', { timeZone: 'Europe/Moscow' });
                console.log(`  👤 ${t} — ${e.name_from_photo || '?'} | ${e.event_type || '?'} | фото: ${e.photo_url ? 'есть' : 'нет'}`);
              });
            }

            // Ошибки из всех источников
            const errors = logs.filter(l => l.level === 'error' || l.level === 'warn');
            if (errors.length > 0) {
              console.log(`\n⚠️  Предупреждения/ошибки за 10 мин:`);
              errors.forEach(l => {
                const t = new Date(l.timestamp).toLocaleString('ru-RU', { timeZone: 'Europe/Moscow' });
                console.log(`  [${l.level.toUpperCase()}] ${t} | ${l.source} | ${l.message}`);
                if (l.meta && Object.keys(l.meta).length > 0) {
                  console.log(`  ${JSON.stringify(l.meta)}`);
                }
              });
              process.exit(1);  // ← Actions покажет красный крестик при ошибках
            }

            console.log('\n✓ Всё в порядке\n');
          }).catch(err => {
            console.error('Ошибка запроса к Supabase:', err.message);
            process.exit(1);
          });
          EOF
