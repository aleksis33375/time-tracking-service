name: AI Worker — Process Events

on:
  schedule:
    - cron: '*/5 * * * *'   # каждые 5 минут
  workflow_dispatch:          # ручной запуск из GitHub UI

concurrency:
  group: ai-worker
  cancel-in-progress: false   # не отменять текущий прогон, ждать завершения

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 8        # меньше интервала запуска — гарантия отсутствия наложений

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-worker/requirements-worker.txt

      - name: Install dependencies
        run: pip install -r ai-worker/requirements-worker.txt

      - name: Process pending events
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MANAGER_CHAT_ID:           ${{ secrets.MANAGER_CHAT_ID }}
        run: python ai-worker/process_events.py
