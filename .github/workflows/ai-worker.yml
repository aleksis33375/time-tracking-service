name: AI Worker — Process Events

on:
  schedule:
    - cron: '*/5 * * * *'   # каждые 5 минут
  workflow_dispatch:          # ручной запуск из GitHub UI

concurrency:
  group: ai-worker
  cancel-in-progress: false   # не отменять текущий прогон, ждать завершения

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 12       # увеличен из-за добавленного Node.js OCR-шага

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - name: OCR — extract timestamps from new photos
        run: node scripts/ocr-worker.js
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-worker/requirements-worker.txt

      - name: Install dependencies
        run: pip install -r ai-worker/requirements-worker.txt

      - name: Process pending events
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MANAGER_CHAT_ID:           ${{ secrets.MANAGER_CHAT_ID }}
        run: python ai-worker/process_events.py
