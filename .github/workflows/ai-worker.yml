name: AI Worker — Process Events

on:
  schedule:
    - cron: '*/5 * * * *'   # каждые 5 минут
  workflow_dispatch:          # ручной запуск из GitHub UI

concurrency:
  group: ai-worker
  cancel-in-progress: false   # не отменять текущий прогон, ждать завершения

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 22       # OCR шаг занимает ~10 мин + Python ~1 мин

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            ai-worker/requirements-worker.txt
            ai-worker/requirements-ocr.txt

      - name: Cache EasyOCR models
        uses: actions/cache@v4
        with:
          path: ~/.EasyOCR
          key: easyocr-models-ru-en-v1

      - name: Install dependencies
        run: |
          pip install -r ai-worker/requirements-worker.txt
          pip install -r ai-worker/requirements-ocr.txt

      - name: OCR — extract timestamps from new photos
        continue-on-error: true   # AI-worker запускается даже если OCR упал
        run: python ai-worker/ocr_worker.py
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Process pending events
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MANAGER_CHAT_ID:           ${{ secrets.MANAGER_CHAT_ID }}
        run: python ai-worker/process_events.py
