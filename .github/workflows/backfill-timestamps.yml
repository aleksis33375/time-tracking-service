name: Backfill — OCR Timestamps

on:
  workflow_dispatch:

concurrency:
  group: backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-worker/requirements-ocr.txt

      - name: Cache EasyOCR models
        uses: actions/cache@v4
        with:
          path: ~/.EasyOCR
          key: easyocr-models-ru-en-v1

      - name: Install dependencies
        run: pip install -r ai-worker/requirements-ocr.txt

      - name: Run backfill
        run: python ai-worker/ocr_worker.py --backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
